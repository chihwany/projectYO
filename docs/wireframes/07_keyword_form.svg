<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <!-- Background -->
  <rect width="375" height="812" fill="#F5F5F5" rx="20"/>
  <rect width="375" height="812" fill="none" stroke="#E0E0E0" stroke-width="2" rx="20"/>

  <!-- Status Bar -->
  <rect x="0" y="0" width="375" height="44" fill="#F5F5F5" rx="20"/>
  <text x="187" y="30" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">9:41</text>

  <!-- Header -->
  <rect x="0" y="44" width="375" height="56" fill="#424242"/>
  <text x="24" y="78" font-family="Arial" font-size="20" fill="#FFFFFF">&lt;</text>
  <text x="187" y="78" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#FFFFFF">키워드 추가</text>

  <!-- Keyword Input -->
  <text x="32" y="136" font-family="Arial" font-size="13" font-weight="bold" fill="#333">키워드 (필수)</text>
  <rect x="16" y="146" width="343" height="48" rx="8" fill="#FFFFFF" stroke="#E0E0E0"/>
  <text x="32" y="175" font-family="Arial" font-size="15" fill="#999">예: 아이폰 15</text>

  <!-- Info Note -->
  <rect x="16" y="218" width="343" height="36" rx="8" fill="#E3F2FD"/>
  <text x="32" y="241" font-family="Arial" font-size="11" fill="#1976D2">번개장터 + 중고나라 모두에서 키워드 매칭 시 알림을 받습니다</text>

  <!-- Price Range -->
  <text x="32" y="290" font-family="Arial" font-size="13" font-weight="bold" fill="#333">가격 범위 (선택)</text>

  <!-- Min Price -->
  <rect x="16" y="302" width="163" height="48" rx="8" fill="#FFFFFF" stroke="#E0E0E0"/>
  <text x="32" y="331" font-family="Arial" font-size="14" fill="#999">최소 가격</text>
  <text x="160" y="331" font-family="Arial" font-size="12" text-anchor="end" fill="#999">원</text>

  <!-- ~ -->
  <text x="187" y="331" font-family="Arial" font-size="16" text-anchor="middle" fill="#999">~</text>

  <!-- Max Price -->
  <rect x="196" y="302" width="163" height="48" rx="8" fill="#FFFFFF" stroke="#E0E0E0"/>
  <text x="212" y="331" font-family="Arial" font-size="14" fill="#999">최대 가격</text>
  <text x="340" y="331" font-family="Arial" font-size="12" text-anchor="end" fill="#999">원</text>

  <!-- Description -->
  <text x="32" y="378" font-family="Arial" font-size="11" fill="#999">가격을 입력하지 않으면 모든 가격대의 매물을 알림 받습니다</text>

  <!-- Save Button -->
  <rect x="16" y="420" width="343" height="52" rx="8" fill="#4A90D9"/>
  <text x="187" y="452" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#FFFFFF">키워드 등록</text>

  <!-- Cancel Button -->
  <rect x="16" y="484" width="343" height="52" rx="8" fill="#FFFFFF" stroke="#E0E0E0"/>
  <text x="187" y="516" font-family="Arial" font-size="16" text-anchor="middle" fill="#999">취소</text>
</svg>