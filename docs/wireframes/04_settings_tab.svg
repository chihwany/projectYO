<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <!-- Background -->
  <rect width="375" height="812" fill="#F5F5F5" rx="20"/>
  <rect width="375" height="812" fill="none" stroke="#E0E0E0" stroke-width="2" rx="20"/>

  <!-- Status Bar -->
  <rect x="0" y="0" width="375" height="44" fill="#F5F5F5" rx="20"/>
  <text x="187" y="30" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">9:41</text>

  <!-- Header -->
  <rect x="0" y="44" width="375" height="56" fill="#424242"/>
  <text x="187" y="78" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#FFFFFF">설정</text>

  <!-- Profile Section -->
  <rect x="16" y="116" width="343" height="80" rx="12" fill="#FFFFFF"/>
  <circle cx="60" cy="156" r="28" fill="#E0E0E0"/>
  <text x="60" y="161" font-family="Arial" font-size="16" text-anchor="middle" fill="#999">U</text>
  <text x="100" y="148" font-family="Arial" font-size="16" font-weight="bold" fill="#333">홍길동</text>
  <text x="100" y="170" font-family="Arial" font-size="13" fill="#999">user@example.com</text>

  <!-- Section: 알림 키워드 -->
  <text x="16" y="228" font-family="Arial" font-size="12" font-weight="bold" fill="#999">알림 키워드</text>
  <rect x="16" y="238" width="343" height="52" rx="12" fill="#FFFFFF"/>
  <text x="32" y="269" font-family="Arial" font-size="15" fill="#333">키워드 관리</text>
  <text x="320" y="269" font-family="Arial" font-size="11" fill="#999">3개</text>
  <text x="343" y="269" font-family="Arial" font-size="15" fill="#CCC">></text>

  <!-- Section: 알림 설정 -->
  <text x="16" y="322" font-family="Arial" font-size="12" font-weight="bold" fill="#999">알림 설정</text>
  <rect x="16" y="332" width="343" height="192" rx="12" fill="#FFFFFF"/>
  <!-- Toggle 1 -->
  <text x="32" y="363" font-family="Arial" font-size="15" fill="#333">알림 수신</text>
  <rect x="300" y="348" width="44" height="24" rx="12" fill="#4CAF50"/>
  <circle cx="332" cy="360" r="10" fill="#FFFFFF"/>
  <!-- Divider -->
  <line x1="32" y1="380" x2="343" y2="380" stroke="#F0F0F0"/>
  <!-- Quiet Hours -->
  <text x="32" y="411" font-family="Arial" font-size="15" fill="#333">방해금지 시간대</text>
  <text x="280" y="411" font-family="Arial" font-size="13" fill="#4A90D9">23:00~07:00</text>
  <!-- Divider -->
  <line x1="32" y1="428" x2="343" y2="428" stroke="#F0F0F0"/>
  <!-- Toggle 2 -->
  <text x="32" y="459" font-family="Arial" font-size="15" fill="#333">진동</text>
  <rect x="300" y="444" width="44" height="24" rx="12" fill="#4CAF50"/>
  <circle cx="332" cy="456" r="10" fill="#FFFFFF"/>
  <!-- Divider -->
  <line x1="32" y1="476" x2="343" y2="476" stroke="#F0F0F0"/>
  <!-- Toggle 3 -->
  <text x="32" y="506" font-family="Arial" font-size="15" fill="#333">사운드</text>
  <rect x="300" y="492" width="44" height="24" rx="12" fill="#E0E0E0"/>
  <circle cx="312" cy="504" r="10" fill="#FFFFFF"/>

  <!-- Section: 기타 -->
  <text x="16" y="530" font-family="Arial" font-size="12" font-weight="bold" fill="#999">기타</text>
  <rect x="16" y="540" width="343" height="104" rx="12" fill="#FFFFFF"/>
  <!-- App Version -->
  <text x="32" y="571" font-family="Arial" font-size="15" fill="#333">앱 버전</text>
  <text x="320" y="571" font-family="Arial" font-size="13" fill="#999">1.0.0</text>
  <!-- Divider -->
  <line x1="32" y1="588" x2="343" y2="588" stroke="#F0F0F0"/>
  <!-- Logout -->
  <text x="32" y="619" font-family="Arial" font-size="15" fill="#E53935">로그아웃</text>
  <!-- Divider -->
  <line x1="32" y1="636" x2="343" y2="636" stroke="#F0F0F0"/>

  <!-- Delete Account -->
  <rect x="16" y="660" width="343" height="48" rx="12" fill="#FFFFFF"/>
  <text x="187" y="689" font-family="Arial" font-size="14" text-anchor="middle" fill="#999">회원 탈퇴</text>

  <!-- Bottom Navigation Bar -->
  <rect x="0" y="732" width="375" height="80" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Tab 1 -->
  <text x="47" y="765" font-family="Arial" font-size="20" text-anchor="middle" fill="#999">&#x1F955;</text>
  <text x="47" y="785" font-family="Arial" font-size="10" text-anchor="middle" fill="#999">당근</text>
  <!-- Tab 2 -->
  <text x="141" y="765" font-family="Arial" font-size="20" text-anchor="middle" fill="#999">&#x1F50D;</text>
  <text x="141" y="785" font-family="Arial" font-size="10" text-anchor="middle" fill="#999">매물검색</text>
  <!-- Tab 3 -->
  <text x="234" y="765" font-family="Arial" font-size="20" text-anchor="middle" fill="#999">&#x1F514;</text>
  <text x="234" y="785" font-family="Arial" font-size="10" text-anchor="middle" fill="#999">알림</text>
  <!-- Tab 4 - Active -->
  <rect x="281" y="732" width="94" height="3" fill="#424242"/>
  <text x="328" y="765" font-family="Arial" font-size="20" text-anchor="middle" fill="#424242">&#x2699;</text>
  <text x="328" y="785" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#424242">설정</text>
</svg>